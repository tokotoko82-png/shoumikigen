<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>賞味期限チェック</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --primary: #1a5c8a;
      --primary-dark: #134569;
      --accent: #e8602c;
      --accent-dark: #c44d20;
      --success: #2e7d52;
      --success-dark: #235f3e;
      --danger: #c0392b;
      --danger-dark: #a93226;
      --text: #1a1e2e;
      --text-sub: #6b7280;
      --border: #d1d5db;
      --tab-inactive: #dce3eb;
      --shadow: 0 2px 8px rgba(0,0,0,0.10);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.14);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--primary);
      color: #fff;
      padding: 14px 16px 0;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding-bottom: 12px;
    }
    .app-title span { font-size: 11px; font-weight: 400; opacity: 0.75; margin-left: 6px; }

    /* ── TABS ── */
    .tab-bar {
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 0 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      background: var(--tab-inactive);
      color: var(--text-sub);
      letter-spacing: 0.03em;
    }
    .tab-btn.active {
      background: var(--bg);
      color: var(--primary);
    }
    .tab-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      font-size: 10px;
      padding: 1px 5px;
      margin-left: 4px;
      vertical-align: middle;
      line-height: 1.4;
    }

    /* ── PANELS ── */
    .tab-panel { display: none; padding: 16px; }
    .tab-panel.active { display: block; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── PRODUCT NAME ── */
    .product-input {
      width: 100%;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: #fafbfc;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .product-input:focus { border-color: var(--primary); }
    .product-input::placeholder { color: #adb5bd; }

    /* ── EXPIRY ROWS ── */
    .expiry-list { display: flex; flex-direction: column; gap: 10px; }

    .expiry-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 10px 10px 12px;
    }
    .expiry-row-left { display: flex; flex-direction: column; gap: 8px; }

    .expiry-date-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .expiry-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      white-space: nowrap;
      min-width: 52px;
    }
    .date-input {
      flex: 1;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      max-width: 110px;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .date-input:focus { border-color: var(--primary); }
    .date-input::placeholder { color: #c4cad4; font-size: 13px; }

    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .qty-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      white-space: nowrap;
      min-width: 52px;
    }
    .qty-ctrl {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .qty-btn {
      width: 40px;
      height: 38px;
      font-size: 20px;
      font-weight: 400;
      border: none;
      background: #eef1f5;
      color: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .qty-btn:active { background: #d4dbe8; }
    .qty-num {
      width: 54px;
      height: 38px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      outline: none;
      -moz-appearance: textfield;
    }
    .qty-num::-webkit-outer-spin-button,
    .qty-num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .del-btn {
      width: 34px;
      height: 34px;
      border: none;
      background: #fdecea;
      color: var(--danger);
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
      align-self: center;
    }
    .del-btn:active { background: #fcd0cc; }

    /* ── ADD ROW BUTTON ── */
    .add-row-btn {
      width: 100%;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      background: #eef4fb;
      border: 1.5px dashed var(--primary);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.1s;
      margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .add-row-btn:active { background: #d7e8f7; }
    .add-row-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      padding: 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:active { background: var(--primary-dark); }
    .btn-success {
      background: var(--success);
      color: #fff;
    }
    .btn-success:active { background: var(--success-dark); }
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .btn-danger:active { background: var(--danger-dark); }
    .btn-outline {
      background: transparent;
      color: var(--text-sub);
      border: 1.5px solid var(--border);
      font-size: 14px;
      padding: 10px;
    }

    /* ── SUMMARY TABLE ── */
    .summary-meta {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 10px;
    }
    .summary-meta strong { color: var(--text); }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .summary-table th {
      background: var(--primary);
      color: #fff;
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
    }
    .summary-table th:last-child { text-align: right; }
    .summary-table td {
      padding: 9px 10px;
      border-bottom: 1px solid #edf0f4;
      vertical-align: top;
    }
    .summary-table td:last-child { text-align: right; font-weight: 700; }
    .summary-table tr:last-child td { border-bottom: none; }
    .summary-table tr:nth-child(even) td { background: #f9fafb; }

    .product-group-header td {
      background: #eef4fb !important;
      font-weight: 700;
      color: var(--primary);
      font-size: 13px;
      border-top: 2px solid var(--primary);
      padding: 8px 10px 6px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-sub);
      padding: 32px 0;
      font-size: 14px;
    }
    .empty-state .icon { font-size: 32px; display: block; margin-bottom: 8px; }

    /* ── GAS URL SETTING ── */
    .settings-card { margin-bottom: 14px; }
    .gas-input {
      width: 100%;
      font-family: inherit;
      font-size: 12px;
      padding: 9px 10px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: #fafbfc;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .gas-input:focus { border-color: var(--primary); }
    .gas-input::placeholder { color: #adb5bd; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1e2e;
      color: #fff;
      padding: 12px 22px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    /* ── TOTALS ROW ── */
    .totals-row td {
      background: #fff8f0 !important;
      font-weight: 700;
      border-top: 2px solid var(--accent) !important;
      color: var(--accent-dark);
    }

    /* ── CLEAR BUTTON ── */
    .btn-row { display: flex; gap: 10px; }
    .btn-row .btn { flex: 1; }

    /* ── COUNT CHIP ── */
    .count-chip {
      display: inline-block;
      background: #eef4fb;
      color: var(--primary);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="app-header">
  <div class="app-title">📦 賞味期限チェック <span>道の駅</span></div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(1)" id="tabBtn1">
      ① 入力
    </button>
    <button class="tab-btn" onclick="switchTab(2)" id="tabBtn2">
      ② 集計 <span class="tab-badge" id="tabBadge">0</span>
    </button>
  </div>
</div>

<!-- ════ TAB 1 ════ -->
<div class="tab-panel active" id="tab1">

  <!-- 商品名 -->
  <div class="card">
    <div class="card-label">🏷 商品名</div>
    <input class="product-input" id="productName" type="text" placeholder="商品名を入力してください" maxlength="50">
  </div>

  <!-- 賞味期限リスト -->
  <div class="card">
    <div class="card-label">📅 賞味期限・個数 <span class="count-chip" id="rowCount">1 / 10</span></div>
    <div class="expiry-list" id="expiryList"></div>
    <button class="add-row-btn" id="addRowBtn" onclick="addRow()">
      <span>＋</span> 賞味期限を追加
    </button>
  </div>

  <!-- 小計ボタン -->
  <button class="btn btn-primary" onclick="doSubtotal()">小計 → ② 集計へ追加</button>

</div>

<!-- ════ TAB 2 ════ -->
<div class="tab-panel" id="tab2">

  <!-- GAS URL 設定 -->
  <div class="card settings-card">
    <div class="card-label">⚙️ 送信先 GAS URL</div>
    <input class="gas-input" id="gasUrl" type="url" placeholder="https://script.google.com/macros/s/..." oninput="saveGasUrl()">
  </div>

  <!-- 集計テーブル -->
  <div class="card">
    <div class="card-label">📋 集計データ</div>
    <div id="summaryWrap">
      <div class="empty-state"><span class="icon">📂</span>① タブで小計を押してください</div>
    </div>
  </div>

  <!-- 送信 / クリア -->
  <div class="btn-row">
    <button class="btn btn-danger btn-outline" onclick="clearAll()">🗑 全クリア</button>
    <button class="btn btn-success" onclick="doSubmit()" id="submitBtn">送信</button>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──
  const MAX_ROWS = 10;
  const MAX_QTY  = 999;
  let summaryData = []; // [{productName, expiryDate, qty}]

  // ── Init ──
  window.addEventListener('load', () => {
    addRow();
    const savedUrl = localStorage.getItem('gasUrl_expiry');
    if (savedUrl) document.getElementById('gasUrl').value = savedUrl;
    renderSummary();
    const saved = localStorage.getItem('summaryData_expiry');
    if (saved) {
      try { summaryData = JSON.parse(saved); renderSummary(); } catch(e) {}
    }
  });

  // ── Tab switch ──
  function switchTab(n) {
    document.getElementById('tab1').classList.toggle('active', n === 1);
    document.getElementById('tab2').classList.toggle('active', n === 2);
    document.getElementById('tabBtn1').classList.toggle('active', n === 1);
    document.getElementById('tabBtn2').classList.toggle('active', n === 2);
  }

  // ── Row management ──
  let rowIdCounter = 0;

  function addRow() {
    const list = document.getElementById('expiryList');
    if (list.children.length >= MAX_ROWS) return;
    const id = ++rowIdCounter;

    const row = document.createElement('div');
    row.className = 'expiry-row';
    row.id = 'row-' + id;
    row.innerHTML = `
      <div class="expiry-row-left">
        <div class="expiry-date-wrap">
          <span class="expiry-label">賞味期限</span>
          <input class="date-input" type="text" id="date-${id}" placeholder="月/日" maxlength="5" inputmode="numeric" oninput="formatDate(this)">
        </div>
        <div class="qty-wrap">
          <span class="qty-label">個数</span>
          <div class="qty-ctrl">
            <button class="qty-btn" type="button" onclick="changeQty(${id}, -1)">－</button>
            <input class="qty-num" type="number" id="qty-${id}" value="0" min="0" max="${MAX_QTY}" inputmode="numeric" oninput="clampQty(this)">
            <button class="qty-btn" type="button" onclick="changeQty(${id}, 1)">＋</button>
          </div>
        </div>
      </div>
      <button class="del-btn" type="button" onclick="delRow(${id})">✕</button>
    `;
    list.appendChild(row);
    updateRowCount();
    updateAddBtn();
  }

  function delRow(id) {
    const list = document.getElementById('expiryList');
    if (list.children.length <= 1) { showToast('最低1行は必要です', 'error'); return; }
    const row = document.getElementById('row-' + id);
    if (row) row.remove();
    updateRowCount();
    updateAddBtn();
  }

  function updateRowCount() {
    const n = document.getElementById('expiryList').children.length;
    document.getElementById('rowCount').textContent = `${n} / ${MAX_ROWS}`;
  }

  function updateAddBtn() {
    const n = document.getElementById('expiryList').children.length;
    document.getElementById('addRowBtn').disabled = n >= MAX_ROWS;
  }

  // ── Qty controls ──
  function changeQty(id, delta) {
    const input = document.getElementById('qty-' + id);
    let v = parseInt(input.value) || 0;
    v = Math.min(MAX_QTY, Math.max(0, v + delta));
    input.value = v;
  }

  function clampQty(input) {
    let v = parseInt(input.value.replace(/\D/g, '')) || 0;
    if (v > MAX_QTY) { v = MAX_QTY; input.value = v; }
  }

  // ── Date auto-format (MM/DD) ──
  function formatDate(input) {
    let v = input.value.replace(/[^0-9\/]/g, '');
    // Auto-insert slash after 2 digits
    if (v.length === 2 && !v.includes('/') && input._prev && input._prev.length < 2) {
      v = v + '/';
    }
    input._prev = v;
    input.value = v;
  }

  // ── Subtotal ──
  function doSubtotal() {
    const productName = document.getElementById('productName').value.trim();
    if (!productName) { showToast('商品名を入力してください', 'error'); document.getElementById('productName').focus(); return; }

    const list = document.getElementById('expiryList');
    const rows = list.querySelectorAll('.expiry-row');
    let added = 0;
    let hasError = false;

    rows.forEach(row => {
      const id = row.id.replace('row-', '');
      const dateVal = document.getElementById('date-' + id).value.trim();
      const qtyVal  = parseInt(document.getElementById('qty-' + id).value) || 0;
      if (!dateVal) { hasError = true; return; }
      if (qtyVal === 0) return; // Skip 0-qty rows silently
      // 同じ商品名＋同じ賞味期限がすでにあれば個数を加算
      const existing = summaryData.find(d => d.productName === productName && d.expiryDate === dateVal);
      if (existing) {
        existing.qty = Math.min(MAX_QTY * 10, existing.qty + qtyVal);
      } else {
        summaryData.push({ productName, expiryDate: dateVal, qty: qtyVal });
      }
      added++;
    });

    if (hasError) { showToast('賞味期限が未入力の行があります', 'error'); return; }
    if (added === 0) { showToast('個数が全て0です', 'error'); return; }

    saveSummary();
    renderSummary();
    updateBadge();
    showToast(`小計追加しました（${added}件）`, 'success');

    // Reset Tab1
    document.getElementById('productName').value = '';
    document.getElementById('expiryList').innerHTML = '';
    rowIdCounter = 0;
    addRow();

    setTimeout(() => switchTab(2), 600);
  }

  // ── Summary render ──
  function renderSummary() {
    const wrap = document.getElementById('summaryWrap');
    if (!summaryData.length) {
      wrap.innerHTML = '<div class="empty-state"><span class="icon">📂</span>① タブで小計を押してください</div>';
      updateBadge();
      return;
    }

    // Group by product
    const groups = {};
    summaryData.forEach(d => {
      if (!groups[d.productName]) groups[d.productName] = [];
      groups[d.productName].push(d);
    });

    let grandTotal = 0;
    let html = '<table class="summary-table"><thead><tr><th>賞味期限</th><th style="text-align:right">個数</th></tr></thead><tbody>';

    Object.entries(groups).forEach(([product, items]) => {
      const productTotal = items.reduce((s, i) => s + i.qty, 0);
      grandTotal += productTotal;
      html += `<tr class="product-group-header"><td colspan="2">📦 ${escHtml(product)}（小計 ${productTotal}個）</td></tr>`;
      items.forEach(item => {
        html += `<tr><td>${escHtml(item.expiryDate)}</td><td>${item.qty}</td></tr>`;
      });
    });

    html += `<tr class="totals-row"><td>合計</td><td>${grandTotal} 個</td></tr>`;
    html += '</tbody></table>';
    wrap.innerHTML = html;
    updateBadge();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateBadge() {
    document.getElementById('tabBadge').textContent = summaryData.length;
  }

  // ── Submit to GAS ──
  async function doSubmit() {
    const gasUrl = document.getElementById('gasUrl').value.trim();
    if (!gasUrl) { showToast('GAS URLを入力してください', 'error'); return; }
    if (!summaryData.length) { showToast('集計データがありません', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送信中…';

    const now = new Date();
    const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    const payload = summaryData.map(d => ({
      datetime: dateStr,
      productName: d.productName,
      expiryDate: d.expiryDate,
      qty: d.qty
    }));

    const params = new URLSearchParams();
    params.append('data', JSON.stringify(payload));

    try {
      await fetch(gasUrl, { method: 'POST', mode: 'no-cors', body: params });
      showToast('送信しました！', 'success');
      summaryData = [];
      saveSummary();
      renderSummary();
    } catch (e) {
      showToast('送信エラーが発生しました', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '送信';
    }
  }

  // ── Clear all ──
  function clearAll() {
    if (!summaryData.length) { showToast('集計データがありません', 'error'); return; }
    if (!confirm('全ての集計データをクリアします。よろしいですか？')) return;
    summaryData = [];
    saveSummary();
    renderSummary();
    showToast('クリアしました');
  }

  // ── Persist ──
  function saveSummary() {
    localStorage.setItem('summaryData_expiry', JSON.stringify(summaryData));
  }
  function saveGasUrl() {
    localStorage.setItem('gasUrl_expiry', document.getElementById('gasUrl').value.trim());
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ' ' + type : '') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.classList.remove('show'); }, 2400);
  }
</script>
</body>
</html>
